name: Build and Release APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'pack_mediavault.sh'
      - '.github/workflows/release-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Read version
        id: ver
        run: |
          VC=$(grep -E 'versionCode\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*=\s*([0-9]+).*/\1/')
          VN=$(grep -E 'versionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "name=$VN" >> "$GITHUB_OUTPUT"
          echo "tag=v${VN}" >> "$GITHUB_OUTPUT"
          echo "apk_name=MediaVault_${VN}_debug.apk" >> "$GITHUB_OUTPUT"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "${{ steps.ver.outputs.apk_name }}"
          ls -lh "${{ steps.ver.outputs.apk_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.apk_name }}
          path: ${{ steps.ver.outputs.apk_name }}
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: MediaVault ${{ steps.ver.outputs.name }}
          body: |
            自动构建 debug APK（versionCode ${{ steps.ver.outputs.code }}）。

            安装：下载下方 `MediaVault_*_debug.apk` 后安装。需允许未知来源 / 覆盖安装。
          files: ${{ steps.ver.outputs.apk_name }}
          draft: false
          prerelease: true
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}